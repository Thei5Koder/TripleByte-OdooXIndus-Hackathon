<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move History - InventoryPro</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* A few specific tweaks just for the history table to keep it neat */
        .text-center { text-align: center; }
        .arrow-icon { font-size: 1.5rem; font-weight: bold; }
        .empty-dash { color: #4b5563; } /* Subtle gray for empty cells */
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">INVENTORY<span class="logo-accent">PRO</span></div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">Dashboard</a>
                
                <div class="nav-item-group">
                    <div class="nav-item" id="operations-toggle">
                        Operations <span class="arrow">▼</span>
                    </div>
                    <div class="sub-menu" id="operations-submenu">
                        <a href="receipts.html" class="sub-nav-item">Receipts</a>
                        <a href="delivery.html" class="sub-nav-item">Delivery</a>
                        <a href="adjustment.html" class="sub-nav-item">Adjustment</a>
                    </div>
                </div>

                <a href="product.html" class="nav-item">Product</a>
                <a href="move-history.html" class="nav-item active">Move History</a>
                <a href="settings.html" class="nav-item">Settings</a>
            </nav>

            <a href="profile.html" class="user-profile">
                <img src="https://ui-avatars.com/api/?name=Admin+User&background=45a29e&color=fff" alt="Profile Picture" class="profile-pic">
                <div class="profile-info">
                    <span class="profile-name">Admin User</span>
                    <span class="profile-role">Manager</span>
                </div>
            </a>
        </aside>

        <main class="main-content">
            <header class="top-header page-header">
                <h1>Move History</h1>
                <button class="btn btn-secondary">⬇ Export Log</button>
            </header>

            <div class="card table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>S.No</th>
                            <th class="text-center">Flow</th>
                            <th>Receipt #</th>
                            <th>Delivery #</th>
                            <th>Transfer #</th>
                            <th>Product / Package Name</th>
                            <th>Date of Operation</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        </tbody>
                </table>
            </div>
        </main>
    </div>
<script src="js/auth.js"></script>
    <script src="js/move-history.js">
    </script>
</body>
</html>
