<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move History - InventoryPro</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* A few specific tweaks just for the history table to keep it neat */
        .text-center { text-align: center; }
        .arrow-icon { font-size: 1.5rem; font-weight: bold; }
        .empty-dash { color: #4b5563; } /* Subtle gray for empty cells */
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">INVENTORY<span class="logo-accent">PRO</span></div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">Dashboard</a>
                
                <div class="nav-item-group">
                    <div class="nav-item" id="operations-toggle">
                        Operations <span class="arrow">▼</span>
                    </div>
                    <div class="sub-menu" id="operations-submenu">
                        <a href="receipts.html" class="sub-nav-item">Receipts</a>
                        <a href="delivery.html" class="sub-nav-item">Delivery</a>
                        <a href="adjustment.html" class="sub-nav-item">Adjustment</a>
                    </div>
                </div>

                <a href="product.html" class="nav-item">Product</a>
                <a href="move-history.html" class="nav-item active">Move History</a>
                <a href="settings.html" class="nav-item">Settings</a>
            </nav>

            <a href="profile.html" class="user-profile">
                <img src="https://ui-avatars.com/api/?name=Admin+User&background=45a29e&color=fff" alt="Profile Picture" class="profile-pic">
                <div class="profile-info">
                    <span class="profile-name">Admin User</span>
                    <span class="profile-role">Manager</span>
                </div>
            </a>
        </aside>

        <main class="main-content">
            <header class="top-header page-header">
                <h1>Move History</h1>
                <button class="btn btn-secondary">⬇ Export Log</button>
            </header>

            <div class="card table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>S.No</th>
                            <th class="text-center">Flow</th>
                            <th>Receipt #</th>
                            <th>Delivery #</th>
                            <th>Transfer #</th>
                            <th>Product / Package Name</th>
                            <th>Date of Operation</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // Sidebar logic
        document.getElementById('operations-toggle').addEventListener('click', function() {
            const submenu = document.getElementById('operations-submenu');
            const arrow = this.querySelector('.arrow');
            submenu.classList.toggle('show');
            arrow.style.transform = submenu.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0deg)';
        });

        /* --- MOCK DATABASE FOR MOVE HISTORY --- 
           Type codes: 'IN' (Receipt), 'OUT' (Delivery), 'MOVE' (Transfer)
        */
        const historyDB = [
            { id: 1, type: 'IN', receiptRef: 'WH/IN/1042', deliveryRef: null, transferRef: null, item: 'Industrial Screws (Pack)', date: '2026-03-14' },
            { id: 2, type: 'OUT', receiptRef: null, deliveryRef: 'WH/OUT/4092', transferRef: null, item: 'Safety Helmets', date: '2026-03-13' },
            { id: 3, type: 'MOVE', receiptRef: null, deliveryRef: null, transferRef: 'WH/TR/8821', item: 'Hydraulic Pump', date: '2026-03-12' },
            { id: 4, type: 'IN', receiptRef: 'WH/IN/1043', deliveryRef: null, transferRef: null, item: 'Printer Ink Cartridge', date: '2026-03-10' },
            { id: 5, type: 'OUT', receiptRef: null, deliveryRef: 'WH/OUT/4093', transferRef: null, item: 'Industrial Screws (Pack)', date: '2026-03-09' }
        ];

        function renderHistoryTable() {
            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = ''; 

            // Dash character for empty columns
            const dash = '<span class="empty-dash">—</span>';

            historyDB.forEach((record, index) => {
                let arrowHTML = '';
                
                // Determine arrow icon and glowing color based on the type of movement
                if (record.type === 'IN') {
                    // Green Down Arrow for Receiving
                    arrowHTML = '<span class="arrow-icon neon-green">⬇</span>';
                } else if (record.type === 'OUT') {
                    // Red Up Arrow for Delivery
                    arrowHTML = '<span class="arrow-icon neon-red">⬆</span>';
                } else if (record.type === 'MOVE') {
                    // Yellow Left-Right Arrow for Internal Transfer
                    arrowHTML = '<span class="arrow-icon neon-orange">⇄</span>';
                }

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="color: #8b92a5;">${index + 1}</td>
                    <td class="text-center">${arrowHTML}</td>
                    <td style="font-family: monospace;">${record.receiptRef || dash}</td>
                    <td style="font-family: monospace;">${record.deliveryRef || dash}</td>
                    <td style="font-family: monospace;">${record.transferRef || dash}</td>
                    <td style="font-weight: 600; color: #fff;">${record.item}</td>
                    <td>${record.date}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Run on load
        renderHistoryTable();
    </script>
</body>
</html>
