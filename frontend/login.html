<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="login-box">
    <h1 class="login-title">Login</h1>

    <input class="input-field" type="text" id="username" placeholder="Username">
    <input class="input-field" type="password" id="password" placeholder="Password">

    <button class="btn btn-primary" onclick="login()">Sign In</button>
    
    <p class="msg" id="msg"></p>
    <a href="#" class="forgot-link">Forgot Password?</a>
  </div>

  <script>
    function login() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const msg = document.getElementById('msg');

      if (!user || !pass) {
        msg.textContent = "Please fill in both fields!";
        msg.className = "msg error-msg";
        return;
      }

      if(user === "hackathon" && pass === "1234") {
        msg.textContent = "Login successful! 🚀";
        msg.className = "msg success-msg";
      } else {
        msg.textContent = "Wrong credentials, try again.";
        msg.className = "msg error-msg";
      }
    }
  </script>

</body>
</html>
