<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - InventoryPro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">INVENTORY<span class="logo-accent">PRO</span></div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">Dashboard</a>
                
                <div class="nav-item-group">
                    <div class="nav-item" id="operations-toggle">
                        Operations <span class="arrow">▼</span>
                    </div>
                    <div class="sub-menu" id="operations-submenu">
                        <a href="receipts.html" class="sub-nav-item">Receipts</a>
                        <a href="delivery.html" class="sub-nav-item">Delivery</a>
                        <a href="adjustment.html" class="sub-nav-item">Adjustment</a>
                    </div>
                </div>

                <a href="product.html" class="nav-item active">Product</a>
                <a href="move-history.html" class="nav-item">Move History</a>
                <a href="settings.html" class="nav-item">Settings</a>
            </nav>

            <a href="profile.html" class="user-profile">
                <img src="https://ui-avatars.com/api/?name=Admin+User&background=45a29e&color=fff" alt="Profile Picture" class="profile-pic">
                <div class="profile-info">
                    <span class="profile-name">Admin User</span>
                    <span class="profile-role">Manager</span>
                </div>
            </a>
        </aside>

        <main class="main-content">
            <header class="top-header page-header">
                <h1>Products Inventory</h1>
                <!-- <button class="btn btn-primary">+ Add New Product</button> -->
            </header>

            <div class="filter-bar card" style="padding: 15px 24px; margin-bottom: -10px; display: flex; align-items: center; gap: 15px;">
    <label for="warehouseFilter" style="color: #8b92a5; font-weight: 600;">Warehouse:</label>
    <select id="warehouseFilter" style="width: 200px;" onchange="renderTable()">
        <option value="All">All Warehouses</option>
        <option value="Main Warehouse">Main Warehouse</option>
        <option value="Zone B Storage">Zone B Storage</option>
    </select>

    <label for="categoryFilter" style="color: #8b92a5; font-weight: 600; margin-left: 15px;">Category:</label>
    <select id="categoryFilter" style="width: 200px;" onchange="renderTable()">
        <option value="All">All Categories</option>
        <option value="Tech & Electronics">Tech & Electronics</option>
        <option value="Raw Materials">Raw Materials</option>
        <option value="Office Supplies">Office Supplies</option>
        <option value="General">General</option>
    </select>
</div>

            <div class="card table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Product Name</th>
                            <th>SKU</th>
                            <th>Category</th>
                            <th>Warehouse</th>
                            <th>Quantity Available</th>
                            <th>Stock Status</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody">
                        </tbody>
                </table>
            </div>
        </main>
    </div>
<script src="js/auth.js"></script>
    <script src="js/product.js">
       
    </script>
</body>
</html>
